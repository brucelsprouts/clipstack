<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 20 20" width="22" height="22">
  <!--
    Tray icon — transparent background, content fills nearly the full frame.
    viewBox zoomed to content bounds (1 1 20 20) so OS sees no padding.
    iconAsTemplate=true on macOS: OS renders as monochrome.
    Windows: renders with color.
  -->

  <!-- Back sheet (rotated, stack effect) -->
  <rect x="1.5" y="3.5" width="15" height="18" rx="2.2"
        fill="#93c5fd" opacity="0.72"
        transform="rotate(-5 9 12.5)"/>

  <!-- Mid sheet -->
  <rect x="1.5" y="3.5" width="15" height="18" rx="2.2"
        fill="#bfdbfe" opacity="0.90"
        transform="rotate(-2 9 12.5)"/>

  <!-- Main clipboard board -->
  <rect x="1" y="3" width="15.5" height="18" rx="2.2"
        fill="#dbeafe"/>

  <!-- Clip housing -->
  <rect x="5.2" y="0.5" width="7" height="4.8" rx="1.4"
        fill="#1e40af"/>
  <rect x="5.9" y="1.2" width="5.6" height="3.1" rx="0.9"
        fill="#3b82f6" opacity="0.55"/>

  <!-- Content lines -->
  <rect x="3"   y="10"  width="11.5" height="2"   rx="1"   fill="#2563eb" opacity="0.85"/>
  <rect x="3"   y="13"  width="9"    height="1.7" rx="0.85" fill="#2563eb" opacity="0.45"/>
  <rect x="3"   y="15.5" width="10.5" height="1.7" rx="0.85" fill="#2563eb" opacity="0.40"/>
  <rect x="3"   y="18"  width="7.5"  height="1.7" rx="0.85" fill="#2563eb" opacity="0.35"/>
</svg>
