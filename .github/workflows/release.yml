# ClipStack — Automated Release Builder
#
# Triggered by pushing a version tag (e.g. git tag v1.0.0 && git push --tags).
# Builds native installers on Windows and macOS, then publishes a GitHub Release
# with all artifacts attached. GitHub auto-appends source code zips to every release.
#

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v1.0.0, v1.2.3, etc.

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-apple-silicon

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node / npm ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Build & publish ───────────────────────────────────────────────────────
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClipStack ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See the full changelog in [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).

            ## Downloads
            | Platform | File |
            |---|---|
            | Windows (installer) | `ClipStack_x.x.x_x64-setup.exe` |
            | Windows (portable)  | `ClipStack_x.x.x_x64_en-US.msi` |
            | macOS (Intel)       | `ClipStack_x.x.x_x64.dmg` |
            | macOS (Apple Silicon) | `ClipStack_x.x.x_aarch64.dmg` |
          releaseDraft: true       # review before publishing
          prerelease: false
          args: --target ${{ matrix.target }}
